<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Records — A2D Solutions</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="shell" id="shell">
      <div class="sidebar__backdrop" id="sidebarBackdrop" hidden aria-hidden="true"></div>

      <aside class="sidebar" id="sidebar" aria-label="Main navigation">
        <div class="sidebar__top">
          <a class="sidebar__brand" href="/" aria-label="Home">
            <img
              class="sidebar__logo"
              src="https://a2dsolutions.pl/wp-content/uploads/2022/11/Logo_horz_white.png"
              alt="A2D Solutions"
              width="180"
              height="40"
              decoding="async"
            />
          </a>

          <div class="sidebar__account" id="accountGuest" hidden>
            <button type="button" class="pill pill--accent" id="scrollToLogin">
              <span class="pill__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              Sign in
            </button>
          </div>

          <div class="sidebar__account" id="accountUser" hidden>
            <div class="pill pill--user" id="userPill">
              <span class="pill__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              <span class="pill__text" id="userEmail"></span>
            </div>
            <button type="button" class="link-btn" id="logoutBtn">Sign out</button>
          </div>

          <nav class="sidebar__nav" id="sidebarNav" aria-label="App">
            <a class="nav-link is-active" href="#" id="navRecords" data-section="records">
              <span class="nav-link__icon" aria-hidden="true">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="3" width="7" height="9" rx="1" />
                  <rect x="14" y="3" width="7" height="5" rx="1" />
                  <rect x="14" y="12" width="7" height="9" rx="1" />
                  <rect x="3" y="16" width="7" height="5" rx="1" />
                </svg>
              </span>
              All records
            </a>
          </nav>

          <div class="sidebar__controls" id="sidebarControls" hidden>
            <p class="sidebar__section-label">Find &amp; sort</p>
            <label class="field">
              <span class="field__label">Search</span>
              <input
                type="search"
                id="filter"
                class="input input--sidebar"
                placeholder="Filter all columns…"
                autocomplete="off"
              />
            </label>
            <label class="field">
              <span class="field__label">Sort by</span>
              <select id="sortField" class="select select--sidebar"></select>
            </label>
            <label class="field">
              <span class="field__label">Order</span>
              <select id="sortDir" class="select select--sidebar">
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
              </select>
            </label>
            <p class="sidebar__section-label">Layout</p>
            <div class="segmented segmented--wide" role="group" aria-label="Layout">
              <button type="button" class="segmented__btn is-active" data-layout="grid" aria-pressed="true">Grid</button>
              <button type="button" class="segmented__btn" data-layout="list" aria-pressed="false">List</button>
            </div>
          </div>
        </div>

        <footer class="sidebar__footer">
          <a class="footer-link" href="#" id="linkPrivacy">
            <span>Privacy policy</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <polyline points="15 3 21 3 21 9" />
              <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
          </a>
          <a class="footer-link" href="#" id="linkSupport">
            <span>Support</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
          </a>
        </footer>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <button type="button" class="icon-btn" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12" />
              <line x1="3" y1="6" x2="21" y2="6" />
              <line x1="3" y1="18" x2="21" y2="18" />
            </svg>
          </button>
          <div class="topbar__titles">
            <h1 class="page-title" id="pageTitle">Welcome</h1>
            <p class="page-subtitle" id="subtitle">Loading…</p>
          </div>
        </header>

        <main class="main">
          <section class="login-panel" id="loginView" aria-labelledby="loginHeading">
            <div class="card card--login">
              <h2 class="card__title" id="loginHeading">Sign in</h2>
              <p class="card__lead">Only registered accounts can access this workspace.</p>

              <div id="loginFlash" class="flash" role="alert" hidden></div>

              <form id="loginForm" class="form" novalidate>
                <label class="field field--login">
                  <span class="field__label">Email</span>
                  <input type="email" name="email" class="input input--light" autocomplete="username" required />
                </label>
                <label class="field field--login">
                  <span class="field__label">Password</span>
                  <input type="password" name="password" class="input input--light" autocomplete="current-password" />
                </label>
                <button type="submit" class="btn btn--primary">Sign in</button>
              </form>

              <div class="login__divider" id="googleDivider" hidden>
                <span>or</span>
              </div>

              <a class="btn btn--google" id="googleBtn" href="/api/auth/google" hidden>
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" width="18" height="18" />
                Sign in with Google
              </a>

              <p class="login__hint" id="passwordHint">
                Use the password your administrator set. Google sign-in is optional and only works if enabled and your email was added.
              </p>
            </div>
          </section>

          <section class="records-panel" id="recordsView" hidden>
            <div id="error" class="banner banner--error" role="alert" hidden></div>
            <div id="empty" class="empty-state" hidden></div>
            <div id="grid" class="grid" hidden></div>
            <div class="table-wrap" id="tableWrap" hidden>
              <table id="table" class="table">
                <thead>
                  <tr id="theadRow"></tr>
                </thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>
          </section>
        </main>
      </div>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
