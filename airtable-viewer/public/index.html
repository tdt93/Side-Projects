<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A2D - Partner Relation</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="shell" id="shell">
      <div class="sidebar__backdrop" id="sidebarBackdrop" hidden aria-hidden="true"></div>

      <aside class="sidebar" id="sidebar" aria-label="Main navigation">
        <div class="sidebar__top">
          <a class="sidebar__brand" href="/" aria-label="Home">
            <img
              class="sidebar__logo"
              src="https://a2dsolutions.pl/wp-content/uploads/2022/11/Logo_horz_white.png"
              alt="A2D Solutions"
              width="180"
              height="40"
              decoding="async"
            />
          </a>

          <div class="sidebar__account">
            <button type="button" class="pill pill--accent" id="accountActionBtn">
              <span class="pill__text" id="accountActionText" data-i18n="signInLabel">Sign in</span>
              <span class="pill__logout" id="logoutIconWrap" hidden aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </span>
            </button>
          </div>

          <div class="sidebar__lang">
            <label class="field">
              <span class="field__label" data-i18n="languageLabel">Language</span>
              <select id="langSelect" class="select select--sidebar"></select>
            </label>
          </div>

          <div class="sidebar__controls" id="sidebarControls" hidden>
            <div class="sidebar__toolbar-list">
              <p class="sidebar__section-label" data-i18n="listViewSection">List</p>
              <div class="segmented segmented--wide" id="viewModeSeg" role="group" aria-label="List view" data-i18n-aria="listViewAria">
                <button type="button" class="segmented__btn is-active" data-view="cases" id="viewModeCases">
                  <span data-i18n="viewActiveCases">Active cases</span>
                </button>
                <button type="button" class="segmented__btn" data-view="clients" id="viewModeClients">
                  <span data-i18n="viewClientList">Client list</span>
                </button>
              </div>

              <p class="sidebar__section-label" data-i18n="findSortLabel">Find &amp; sort</p>
              <label class="field">
                <span class="field__label" data-i18n="searchLabel">Search</span>
                <input
                  type="search"
                  id="filter"
                  class="input input--sidebar js-toolbar-filter"
                  placeholder=""
                  autocomplete="off"
                />
              </label>
            </div>
            <label class="field">
              <span class="field__label" data-i18n="sortByLabel">Sort by</span>
              <select id="sortField" class="select select--sidebar"></select>
            </label>
            <label class="field">
              <span class="field__label" data-i18n="orderLabel">Order</span>
              <select id="sortDir" class="select select--sidebar">
                <option value="asc"></option>
                <option value="desc"></option>
              </select>
            </label>
          </div>
        </div>

        <footer class="sidebar__footer">
          <a
            class="footer-link"
            href="https://a2dsolutions.pl/pl/polityka-prywatnosci/"
            id="linkPrivacy"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span data-i18n="footerPrivacy">Privacy policy</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" />
              <polyline points="15 3 21 3 21 9" />
              <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
          </a>
          <a class="footer-link" href="mailto:kontakt@a2dsolutions.pl" id="linkSupport">
            <span data-i18n="footerSupport">Support</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
          </a>
        </footer>
      </aside>

      <div class="workspace">
        <header class="topbar">
          <div class="topbar__mobile-row">
            <span class="topbar__mobile-spacer" aria-hidden="true"></span>
            <a class="topbar__brand topbar__brand--mobile" href="/" aria-label="Home">
              <img
                class="topbar__logo topbar__logo--mobile"
                src="https://a2dsolutions.pl/wp-content/uploads/2022/11/Logo_horz_white.png"
                alt=""
                width="220"
                height="48"
                decoding="async"
              />
            </a>
            <button type="button" class="icon-btn icon-btn--menu-end" id="menuToggle" aria-label="Open menu" aria-expanded="false" aria-controls="sidebar">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
          </div>
          <div class="topbar__titles">
            <h1 class="page-title" id="pageTitle">Welcome</h1>
            <p class="page-subtitle" id="subtitle" aria-live="polite"></p>
          </div>
        </header>

        <div class="workspace-toolbar" id="workspaceToolbar" hidden>
          <p class="workspace-toolbar__label" data-i18n="listViewSection">List</p>
          <div class="segmented segmented--wide segmented--light" id="viewModeSegMobile" role="group" aria-label="List view" data-i18n-aria="listViewAria">
            <button type="button" class="segmented__btn is-active" data-view="cases" id="viewModeCasesMobile">
              <span data-i18n="viewActiveCases">Active cases</span>
            </button>
            <button type="button" class="segmented__btn" data-view="clients" id="viewModeClientsMobile">
              <span data-i18n="viewClientList">Client list</span>
            </button>
          </div>
          <label class="field workspace-toolbar__search">
            <span class="field__label workspace-toolbar__search-label" data-i18n="searchLabel">Search</span>
            <input
              type="search"
              id="filterMobile"
              class="input workspace-toolbar__input js-toolbar-filter"
              placeholder=""
              autocomplete="off"
            />
          </label>
        </div>

        <main class="main" id="workspaceMain">
          <section class="login-panel" id="loginView" aria-labelledby="loginHeading">
            <div class="card card--login">
              <h2 class="card__title" id="loginHeading" data-i18n="loginHeading">Sign in</h2>
              <p class="card__lead" data-i18n="loginLead">Sign in with your business email and phone number.</p>

              <div id="loginFlash" class="flash" role="alert" hidden></div>

              <form id="loginForm" class="form" novalidate>
                <label class="field field--login">
                  <span class="field__label" data-i18n="emailLabel">Email</span>
                  <input type="email" name="email" class="input input--light" autocomplete="username" required />
                </label>
                <label class="field field--login">
                  <span class="field__label" data-i18n="phoneLabel">Phone number</span>
                  <input
                    type="tel"
                    name="phone"
                    class="input input--light"
                    autocomplete="tel"
                    inputmode="tel"
                    required
                  />
                </label>
                <button type="submit" class="btn btn--primary" data-i18n="signInLabel">Sign in</button>
              </form>

              <p class="login__hint" id="loginHint" data-i18n="loginHint"></p>
            </div>
          </section>

          <section class="records-panel" id="recordsView" hidden>
            <div id="error" class="banner banner--error" role="alert" hidden></div>
            <div id="empty" class="empty-state" hidden></div>
            <div class="card-list card-list--mobile" id="cardList" hidden aria-label="Records"></div>
            <div class="table-wrap table-wrap--animated" id="tableWrap" hidden>
              <table id="table" class="table">
                <thead>
                  <tr id="theadRow"></tr>
                </thead>
                <tbody id="tbody"></tbody>
              </table>
            </div>

            <div class="pager pager--main" id="pager" hidden>
              <div class="pager__row pager__row--main">
                <button type="button" class="pager__btn pager__btn--main" id="prevPageBtn" data-i18n="pagerPrev">
                  Prev
                </button>
                <span class="pager__info pager__info--main" id="pageInfo"></span>
                <button type="button" class="pager__btn pager__btn--main" id="nextPageBtn" data-i18n="pagerNext">
                  Next
                </button>
              </div>
              <div class="pager__row pager__row--tight pager__row--main">
                <label class="field field--inline field--pager-main">
                  <span class="field__label field__label--pager" data-i18n="perPageLabel">Per page</span>
                  <select id="pageSizeSelect" class="select select--main">
                    <option value="15">15</option>
                    <option value="20">20</option>
                  </select>
                </label>
              </div>
            </div>
          </section>
        </main>

        <footer class="workspace-footer">
          <p class="workspace-footer__text" id="workspaceFooterCopy"></p>
        </footer>
      </div>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
